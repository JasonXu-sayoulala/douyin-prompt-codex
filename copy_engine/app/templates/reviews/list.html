{% extends "base.html" %}
{% block title %}审核池{% endblock %}
{% block content %}
<h2 class="mb-3">审核池</h2>
<form class="row g-2 mb-3" method="get">
  <div class="col-auto">
    <select class="form-select" name="status">
      <option value="">全部</option>
      <option value="pending_review" {% if filters.status == 'pending_review' %}selected{% endif %}>待审核</option>
      <option value="approved" {% if filters.status == 'approved' %}selected{% endif %}>已通过</option>
      <option value="rejected" {% if filters.status == 'rejected' %}selected{% endif %}>已驳回/作废</option>
    </select>
  </div>
  <div class="col-auto"><button class="btn btn-secondary" type="submit">筛选</button></div>
</form>
<div class="table-responsive card shadow-sm">
  <table class="table table-hover mb-0">
    <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>标题</th>
        <th>类型</th>
        <th>状态</th>
        <th>更新时间</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      {% for c in items %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ (c.title or '')[:50] }}</td>
        <td>{{ c.content_type }}</td>
        <td>{{ c.status }}</td>
        <td>{{ c.updated_at.strftime('%Y-%m-%d %H:%M') }}</td>
        <td><a class="btn btn-sm btn-outline-primary" href="{{ url_for('reviews.detail', content_id=c.id) }}">详情</a></td>
      </tr>
      {% else %}
      <tr><td colspan="6" class="text-center text-muted py-4">暂无记录</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
